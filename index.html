<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analista IA Premium - Relatórios de Tráfego</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border-top-color: #3b82f6; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #outputText::-webkit-scrollbar { width: 8px; }
        #outputText::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        #outputText::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        #outputText::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 text-slate-900 font-sans">
    <div class="max-w-5xl mx-auto bg-white p-6 md:p-10 rounded-3xl shadow-2xl border border-slate-100">
        <header class="mb-10 border-b border-slate-100 pb-8 text-center md:text-left flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
                <h1 class="text-3xl md:text-4xl font-black text-slate-800 flex items-center justify-center md:justify-start gap-3">
                    <span class="bg-blue-600 text-white p-2 rounded-xl text-3xl">🤖</span>
                    Analista IA Premium
                </h1>
                <p class="text-slate-500 mt-3 text-lg">Relatórios de Alta Performance para Gestores de Tráfego.</p>
            </div>
            <button onclick="resetForm()" class="text-slate-400 hover:text-red-500 transition-colors flex items-center justify-center gap-2 font-bold text-sm uppercase tracking-widest px-4 py-2 rounded-lg border border-slate-100 hover:border-red-100 hover:bg-red-50">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                Limpar Dados
            </button>
        </header>

        <section class="grid grid-cols-1 gap-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="group relative p-6 border-2 border-dashed border-slate-200 rounded-2xl bg-white hover:border-blue-400 hover:bg-blue-50/30 transition-all">
                    <label class="block text-sm font-bold text-slate-700 mb-3 uppercase tracking-wider">📅 Relatório Atual (CSV)</label>
                    <input type="file" id="fileCurrent" accept=".csv" 
                        class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-bold file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer">
                </div>

                <div class="group relative p-6 border-2 border-dashed border-slate-200 rounded-2xl bg-white hover:border-emerald-400 hover:bg-emerald-50/30 transition-all">
                    <label class="block text-sm font-bold text-slate-700 mb-3 uppercase tracking-wider">🔄 Comparativo (Opcional)</label>
                    <input type="file" id="filePrevious" accept=".csv" 
                        class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-bold file:bg-emerald-600 file:text-white hover:file:bg-emerald-700 cursor-pointer">
                </div>
            </div>

            <button onclick="processData()" id="btnGenerate" 
                class="group w-full bg-slate-900 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-blue-600 active:scale-[0.98] transition-all flex items-center justify-center gap-3 text-lg">
                <span>GERAR RELATÓRIO PADRONIZADO</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" /></svg>
            </button>
        </section>

        <div id="loading" class="hidden mt-12 text-center">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-blue-600 h-16 w-16 mx-auto mb-4"></div>
            <p class="text-slate-600 font-bold text-xl animate-pulse">A IA está gerando sua análise executiva...</p>
        </div>

        <div id="resultContainer" class="hidden mt-12 space-y-4">
            <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                <h2 class="text-xl font-black text-slate-800 flex items-center gap-2">
                    <span class="text-blue-600">●</span> Relatório Formatado para WhatsApp
                </h2>
                <button onclick="copyToClipboard()" 
                    class="w-full md:w-auto bg-blue-600 text-white px-8 py-2 rounded-xl hover:bg-blue-700 transition-all flex items-center justify-center gap-2 font-bold shadow-lg shadow-blue-100">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" /></svg>
                    COPIAR RELATÓRIO
                </button>
            </div>
            <textarea id="outputText" 
                class="w-full h-[650px] p-6 border-2 border-slate-100 rounded-3xl bg-slate-50 text-slate-700 font-mono text-sm leading-relaxed focus:ring-2 focus:ring-blue-100 outline-none shadow-inner resize-none" 
                readonly></textarea>
        </div>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl transition-all opacity-0 translate-y-10 pointer-events-none font-bold z-50">
        Copiado!
    </div>

    <script>
        const apiKey = ""; 

        function resetForm() {
            document.getElementById('fileCurrent').value = '';
            document.getElementById('filePrevious').value = '';
            document.getElementById('outputText').value = '';
            document.getElementById('resultContainer').classList.add('hidden');
            document.getElementById('loading').classList.add('hidden');
        }

        async function processData() {
            const fileCurrent = document.getElementById('fileCurrent').files[0];
            const filePrevious = document.getElementById('filePrevious').files[0];

            if (!fileCurrent) return alert("Por favor, selecione o relatório atual.");

            toggleLoading(true);

            try {
                const csvCurrent = await parseCSV(fileCurrent);
                let csvPrevious = null;
                if (filePrevious) {
                    csvPrevious = await parseCSV(filePrevious);
                }

                const systemPrompt = "Aja como um Gestor de Tráfego de Alta Performance. Sua tarefa é transformar dados brutos de CSV em relatórios padronizados e estratégicos para WhatsApp.";

                const userPrompt = `
                    DADOS ATUAIS (JSON):
                    ${JSON.stringify(csvCurrent.data.slice(0, 150))}

                    ${csvPrevious ? `DADOS ANTERIORES (JSON): ${JSON.stringify(csvPrevious.data.slice(0, 150))}` : ''}

                    REGRAS DE OURO (MANDATÓRIAS):
                    1. FOCO NO RESUMO GERAL: Some todos os valores para dar o total da conta.
                    2. LÓGICA DE REPETIDOS: [Conversas iniciadas] - [Novos contatos de mensagem]. Reporte a diferença como 'Repetidos' (pessoas que voltaram a entrar em contato via anúncios).
                    3. QUALIFICAÇÃO: Calcule a % de Novos Contatos em relação ao Total de Conversas.
                    4. RANKINGS: Gere Top 3 Campanhas por Volume e Top 3 por Menor Custo.

                    ESTRUTURA DO RELATÓRIO (MANTENHA ESTA ORDEM):
                    
                    📊 *RELATÓRIO DE PERFORMANCE SEMANAL*
                    ━━━━━━━━━━━━━━━━━━━━
                    🗓️ *Período:* [Extraia do CSV]

                    💰 *RESUMO DE INVESTIMENTO*
                    ▪️ Valor Total Investido: *R$ [Soma]*
                    ▪️ Alcance: *[Soma]*
                    ▪️ Impressões: *[Soma]*

                    📩 *ENGAJAMENTO E RESULTADOS*
                    ▪️ Total de Resultados: *[Conversas + Leads]*
                    ▪️ Conversas Iniciadas: *[Soma]*
                    ▪️ Novos Contatos: *[Soma]*
                    ▪️ Cadastros (Formulário): *[Soma de 'Leads/Cadastros']*
                    ▪️ Contatos Repetidos: *[Valor]* (pessoas que voltaram a entrar em contato).

                    📉 *EFICIÊNCIA E QUALIFICAÇÃO*
                    ▪️ Custo por Lead (CPL): *R$ [Investimento / Resultados]*
                    ▪️ Taxa de Qualificação: *[% de novos contatos sobre o total de conversas]*

                    🏆 *RANKINGS DAS CAMPANHAS*
                    *Top 3 Volume:*
                    [Lista]
                    *Top 3 Custo-Benefício:*
                    [Lista]

                    ${csvPrevious ? `🔄 *COMPARATIVO SEMANA ANTERIOR*
                    ━━━━━━━━━━━━━━━━━━━━
                    📈 *Conversas/Leads:* [Variação %]
                    📋 *Cadastros:* [Variação %]
                    👤 *Novos Contatos:* [Variação %]
                    💸 *CPL Médio:* [Variação %]
                    
                    *Status:* [Análise de performance].` : ''}

                    🚀 *CONCLUSÃO ESTRATÉGICA*
                    [Gere uma única frase motivadora e analítica baseada nos números].

                    ━━━━━━━━━━━━━━━━━━━━
                    *Analista IA Premium*
                `;

                const response = await callGemini(userPrompt, systemPrompt);
                
                document.getElementById('outputText').value = response;
                document.getElementById('resultContainer').classList.remove('hidden');
                document.getElementById('resultContainer').scrollIntoView({ behavior: 'smooth' });
            } catch (error) {
                console.error(error);
                alert("Erro: " + error.message);
            } finally {
                toggleLoading(false);
            }
        }

        function parseCSV(file) {
            return new Promise((resolve, reject) => {
                Papa.parse(file, {
                    header: true,
                    skipEmptyLines: true,
                    dynamicTyping: true,
                    complete: resolve,
                    error: reject
                });
            });
        }

        async function callGemini(prompt, systemInstruction) {
            const model = "gemini-2.5-flash-preview-09-2025";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;

            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemInstruction }] }
            };

            let retries = 5;
            let delay = 1000;

            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error("Erro na API");
                    const json = await response.json();
                    return json.candidates?.[0]?.content?.parts?.[0]?.text || "Erro ao gerar.";
                } catch (error) {
                    if (i === retries - 1) throw error;
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 2;
                }
            }
        }

        function toggleLoading(show) {
            document.getElementById('loading').classList.toggle('hidden', !show);
            document.getElementById('btnGenerate').disabled = show;
            document.getElementById('btnGenerate').style.opacity = show ? "0.6" : "1";
        }

        function copyToClipboard() {
            const text = document.getElementById("outputText").value;
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            showToast("Relatório copiado!");
        }

        function showToast(msg) {
            const toast = document.getElementById("toast");
            toast.innerText = msg;
            toast.classList.remove('opacity-0', 'translate-y-10');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-10');
                toast.classList.remove('opacity-100', 'translate-y-0');
            }, 3000);
        }
    </script>
</body>
</html>
